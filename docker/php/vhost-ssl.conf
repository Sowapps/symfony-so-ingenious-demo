<VirtualHost *:443>
    ServerName so-ingenious.local
    DocumentRoot /var/www/html/public

    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/so-ingenious.local.pem
    SSLCertificateKeyFile /etc/apache2/certs/so-ingenious.local-key.pem

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
